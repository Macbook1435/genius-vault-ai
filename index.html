
<!DOCTYPE html>
<html>
<head>
  <title>Genius Vault AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      color: #00ff88;
    }

    .hero-img {
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .box {
      background: #151b2b;
      padding: 18px;
      border-radius: 14px;
      margin: 15px 0;
      text-align: left;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #00c853;
      color: white;
      border: none;
      border-radius: 10px;

      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    #preview {
      max-width: 320px;
      width: 100%;
      display: none;
      margin: 15px auto;
      border-radius: 12px;
    }

    .result {
      background: #101828;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      white-space: pre-wrap;
    }
.scanner-frame {
  position: relative;
  width: 280px;
  height: 390px;
  margin: 20px auto;
  border-radius: 20px;
}

.scanner-frame span {
  position: absolute;
  width: 40px;
  height: 40px;
  border: 4px solid white;
}

.scanner-frame span:nth-child(1) {
  top: 0;
  left: 0;
  border-right: none;
  border-bottom: none;
}

.scanner-frame span:nth-child(2) {
  top: 0;
  right: 0;
  border-left: none;
  border-bottom: none;
}

.scanner-frame span:nth-child(3) {
  bottom: 0;
  left: 0;
  border-right: none;
  border-top: none;
}

.scanner-frame span:nth-child(4) {
  bottom: 0;
  right: 0;
  border-left: none;
  border-top: none;
}
  .preview-container {
  position: relative;
  width: 280px;
  height: 390px;
  margin: 20px auto;
}

.preview-container #preview {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform: scale(1.05);
  object-position: center;
  display: block;
  border-radius: 12px;
  position: relative;
  top: 0;
  left: 0;
  z-index: 5;
}
 
.preview-container .scanner-frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  margin: 0;
  z-index: 10;
}  
  </style>
</head>

<body>
  <div class="container">

    <h1>Genius Vault AI</h1>
    <p>AI Sports Card Scanner + Profit Generator</p>

  <div class="box">
  <h2>1. Upload Card Image</h2>

  <input type="file" id="imageUpload" accept="image/*" onchange="previewImage()">
  
<label style="display:block;margin-top:10px;">Upload Back of Card</label>
<input type="file" id="backImageUpload" accept="image/*" onchange="previewBackImage()">

<img id="backPreview" style="max-width:320px;width:100%;display:none;margin:15px auto;border-radius:12px;">
  <div class="preview-container">
    
     <img id="preview">
    
     <div class="scanner-frame">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
     </div>
        
    
    
  </div>
    
  </div>

  <button onclick="aiScan()">RUN AI SCAN</button>
</div>
    <div class="box">
      <h2>4. TikTok Generator</h2>
      <button onclick="generateTikTok()">GENERATE TIKTOK POST</button>
      <div id="tiktokBox" class="result">TikTok post will appear here...</div>
    </div>

    <div class="box">
      <h2>5. eBay Generator</h2>
      <button onclick="generateEbay()">GENERATE EBAY LISTING</button>
      <div id="ebayBox" class="result">eBay listing will appear here...</div>
    </div>

    <div class="box">
      <h2>AI Scan Output</h2>
      <div id="output" class="result">Upload a card and press RUN AI SCAN.</div>
    </div>

  </div>

<script>
function previewImage() {
  const file = document.getElementById("imageUpload").files[0];
  const preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

  
function previewBackImage() {
  const file = document.getElementById("backImageUpload").files[0];
  const preview = document.getElementById("backPreview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const maxWidth = 1200;
        const scale = Math.min(1, maxWidth / img.width);

        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(
          blob => {
            if (blob) resolve(blob);
            else reject(new Error("Image compression failed"));
          },
          "image/jpeg",
          0.75
        );
      };

      img.onerror = reject;
      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function aiScan() {
 const fileInput = document.getElementById("imageUpload");
const backFileInput = document.getElementById("backImageUpload");
const file = fileInput.files[0];
const backFile = backFileInput.files[0];
const output = document.getElementById("output");

if (!file) {
  alert("Upload a card photo first");
  return;
}

output.innerHTML = "Scanning card with OpenAI AI Vision...";

const frontBlob = await compressImage(file);
const formData = new FormData();
formData.append("image", frontBlob, "front.jpg");

if (backFile) {
  const backBlob = await compressImage(backFile);
  formData.append("back", backBlob, "back.jpg");
}
try {
  const response = await fetch("/api/scan", {
    method: "POST",
    body: formData
  });

  const data = await response.json();
  const backScan = backFile ? "\n\nBACK OF CARD SCANNED SUCCESSFULLY" : "";
 const ebaySearch = encodeURIComponent(
 ((data.results || "").match(/Suggested eBay Search:\s*(.*)/i)?.[1]) || "sports card"
);

const compsResponse = await fetch("/api/comps?q=" + ebaySearch);
const compsData = await compsResponse.json();
const compsList = Array.isArray(compsData.comps) ? compsData.comps : [];

output.innerHTML =
  (data.results || "No scan result returned.") +
  backScan +
  "<br><br><b>REAL SOLD COMPS:</b><br>" +
  (compsList.length
    ? compsList.map(comp =>
        `${comp.title} - ${comp.soldPrice} (${comp.dateSold})`
      ).join("<br>")
    : "No sold comps found yet.");
} catch (error) {
  console.error(error);
  output.innerHTML = error.message || "AI scan failed.";
}
  
  }

 

function generateProfit() {
  const paid = Number(document.getElementById("paid").value || 0);
  const sell = Number(document.getElementById("sell").value || 0);
  const fees = sell * 0.13;
  const profit = sell - paid - fees;

  document.getElementById("profitBox").innerHTML =
`Paid: $${paid.toFixed(2)}
Estimated Sell Price: $${sell.toFixed(2)}
Estimated Fees: $${fees.toFixed(2)}
Estimated Profit: $${profit.toFixed(2)}`;
}

function getScanText() {
  return document.getElementById("output").innerText || "";
}

function getLine(label, scanText) {
  const line = scanText
    .split("\n")
    .map(l => l.trim())
    .find(l => l.toLowerCase().startsWith(label.toLowerCase()));

  return line ? line.split(":").slice(1).join(":").trim() : "";
}

function generateTikTok() {
  const scan = getScanText();

  const player = getLine("Player", scan);
  const year = getLine("Year", scan);
  const brand = getLine("Brand / Set", scan);
  const parallel = getLine("Parallel / Insert", scan);
  const numbered = getLine("Numbered", scan);
  const value = getLine("Estimated Value Range", scan);
  const hashtags = getLine("Hashtags", scan);

  document.getElementById("tiktokBox").innerHTML =
`🔥 Fresh scan from Genius Vault AI 🔥

This is a ${year} ${brand} ${player} ${parallel} ${numbered} sports card, and this one has serious collector appeal. Cards like this are exactly why the hobby is fun — rookie heat, parallel shine, limited numbering, and a player collectors are watching closely.

Estimated value range: ${value}

Would you grade this, sell it now, or hold it in the vault and wait for the market to move? Drop your opinion below because I want to know what the card community thinks.

First comment:
Would you list this card or keep it in the vault?

${hashtags || "#sportscards #footballcards #thehobby #rookiecards #cardcollector"}`;
}
  

function generateEbay() {
  const scan = getScanText();

  const title = getLine("Listing Title", scan);
  const player = getLine("Player", scan);
  const year = getLine("Year", scan);
  const brand = getLine("Brand / Set", scan);
  const parallel = getLine("Parallel / Insert", scan);
  const condition = getLine("Condition Estimate", scan);
  const numbered = getLine("Numbered", scan);
  const value = getLine("Estimated Value Range", scan);

  document.getElementById("ebayBox").innerHTML = `Title:

${title || `${year} ${brand} ${player} ${parallel} ${numbered} Sports Card`}

Description:
You are viewing the actual card shown in the photos.

Player: ${player}
Year: ${year}
Brand/Set: ${brand}
Parallel/Insert: ${parallel}
Numbered: ${numbered}
Condition: ${condition}
Estimated Value Range: ${value}

Great card for collectors, investors, and fans.

Ships protected with care.`;
}
</script>

</body>
</html>
