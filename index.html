<!DOCTYPE html>
<html>
<head>
<title>Genius Vault AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#070707;color:white;font-family:Arial;margin:0;padding:20px}
.app{max-width:900px;margin:auto;background:#171717;padding:20px;border-radius:14px;box-shadow:0 0 25px gold}
h1{text-align:center;color:gold}
input,select,button{width:100%;padding:13px;margin:6px 0;border-radius:8px;border:none;font-size:16px}
button{background:gold;color:black;font-weight:bold;cursor:pointer}
.gray{background:#ccc}
.green{background:#00e676}
.box{background:#0b0b0b;padding:15px;margin-top:12px;border-radius:8px;white-space:pre-wrap}
label{color:gold;font-weight:bold}
#preview{max-width:100%;display:none;margin:10px 0;border-radius:10px}
</style>
</head>

<body>
<div class="app">
<h1>👑 Genius Vault AI</h1>
<p>Sports Card Listing + Profit Generator</p>

<label>AI Scan</label>
<input type="file" id="imageUpload" accept="image/*" onchange="previewImage()">
<img id="preview">
<button class="green" onclick="aiScan()">Run AI Scan 🔥</button>

<input id="player" placeholder="Player Name">
<input id="year" placeholder="Year">
<input id="brand" placeholder="Brand / Set">
<input id="parallel" placeholder="Parallel / Insert: Zebra, Silver, Downtown, Patch, Auto, etc.">
<input id="condition" placeholder="Condition: Raw, PSA 10, SGC 10, Near Mint, etc.">
<input id="numbered" placeholder="Numbered: /10, /25, /99, or leave blank">

<label>Money / Profit</label>
<input id="cost" placeholder="What you paid">
<input id="price" placeholder="Selling / Asking price">
<input id="shipping" placeholder="Shipping cost">
<input id="fees" placeholder="Platform fee % ex. 13.25">

<select id="mode">
<option>TikTok Mode</option>
<option>eBay Mode</option>
<option>Shopify Mode</option>
<option>Instagram Mode</option>
<option>Whatnot Mode</option>
</select>

<button onclick="generateListing()">Generate Listing</button>
<button onclick="copyListing()">Copy Listing</button>
<button onclick="calculateProfit()">Calculate Profit</button>
<button class="gray" onclick="clearEverything()">Clear Everything</button>

<div id="output" class="box">Your listing will appear here...</div>

<h3 style="color:gold">Profit Calculator</h3>
<div id="profitBox" class="box">Profit will appear here...</div>
</div>

<script>
function previewImage(){
  const file=document.getElementById("imageUpload").files[0];
  const preview=document.getElementById("preview");
  if(file){
    preview.src=URL.createObjectURL(file);
    preview.style.display="block";
  }
}

async function aiScan(){
  const file=document.getElementById("imageUpload").files[0];

  if(!file){
    alert("Upload a card photo first.");
    return;
  }

  document.getElementById("output").innerText=
  "AI Scan starting 🔥\n\nReading card image...";

  try{
    const formData=new FormData();
    formData.append("image",file);

    const res=await fetch("/api/scan",{
      method:"POST",
      body:formData
    });

    if(!res.ok) throw new Error("Scan endpoint not ready.");

    const data=await res.json();

    document.getElementById("player").value=data.player||"";
    document.getElementById("year").value=data.year||"";
    document.getElementById("brand").value=data.brand||data.set||"";
    document.getElementById("parallel").value=data.parallel||"";
    document.getElementById("condition").value=data.condition||"";
    document.getElementById("numbered").value=data.numbered||data.numbering||"";

    document.getElementById("output").innerText=
    "AI Scan Complete 🔥\n\n"+JSON.stringify(data,null,2);

  }catch(err){
    document.getElementById("output").innerText=
    "AI Scan button works ✅\n\nThe photo uploaded successfully.\n\nNext step: connect /api/scan to OpenAI Vision.";
  }
}

function generateListing(){
  const player=document.getElementById("player").value;
  const year=document.getElementById("year").value;
  const brand=document.getElementById("brand").value;
  const parallel=document.getElementById("parallel").value;
  const condition=document.getElementById("condition").value;
  const numbered=document.getElementById("numbered").value;
  const mode=document.getElementById("mode").value;

  const title=`${year} ${brand} ${player} ${parallel} ${numbered}`.replace(/\s+/g," ").trim();

  const listing=
`${title}

Condition: ${condition}

This listing is for the exact card shown in the photos. Please review all photos before purchasing.

Great pickup for collectors, investors, and sports card fans.

Ships safely and securely from Koollicks Vault.

${mode} Description:
🔥 ${player} ${parallel} from ${brand}. Clean card for the vault. Great collectible and perfect for any football card collector.

Hashtags:
#sportscards #footballcards #cardcollector #thehobby #koollicksvault

First Comment:
Would you grade it, hold it, or flip it? 👀🔥`;

  document.getElementById("output").innerText=listing;
}

function calculateProfit(){
  const cost=parseFloat(document.getElementById("cost").value)||0;
  const price=parseFloat(document.getElementById("price").value)||0;
  const shipping=parseFloat(document.getElementById("shipping").value)||0;
  const fees=parseFloat(document.getElementById("fees").value)||0;

  const feeAmount=price*(fees/100);
  const profit=price-cost-shipping-feeAmount;
  const roi=cost>0?(profit/cost)*100:0;

  document.getElementById("profitBox").innerText=
`Sale Price: $${price.toFixed(2)}
Cost Paid: $${cost.toFixed(2)}
Shipping: $${shipping.toFixed(2)}
Platform Fees: $${feeAmount.toFixed(2)}

Estimated Profit: $${profit.toFixed(2)}
ROI: ${roi.toFixed(1)}%`;
}

function copyListing(){
  navigator.clipboard.writeText(document.getElementById("output").innerText);
  alert("Copied!");
}

function clearEverything(){
  document.querySelectorAll("input").forEach(input=>input.value="");
  document.getElementById("output").innerText="Your listing will appear here...";
  document.getElementById("profitBox").innerText="Profit will appear here...";
  document.getElementById("preview").style.display="none";
}
</script>
</body>
</html>
