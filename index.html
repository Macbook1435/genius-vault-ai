<!DOCTYPE html>
<html>
<head>
<title>Genius Vault AI</title>
<style>
body{background:#0d0d0d;color:white;font-family:Arial;padding:20px}
.app{max-width:900px;margin:auto;background:#1b1b1b;padding:20px;border-radius:15px;box-shadow:0 0 25px gold}
h1{text-align:center;color:gold}
input,select,button,textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;font-size:16px;box-sizing:border-box}
button{background:gold;color:black;font-weight:bold;cursor:pointer}
.gray{background:#bbb}
#output,#profitBox{margin-top:20px;white-space:pre-wrap;background:#111;padding:15px;border-radius:10px}
#preview{max-width:240px;margin-top:15px;border-radius:10px;display:none}
label{font-weight:bold;margin-top:15px;display:block;color:gold}
</style>
</head>

<body>
<div class="app">
<h1>👑 Genius Vault AI</h1>
<p>Sports Card Listing + Profit Generator</p>

<input type="file" id="imageUpload" accept="image/*" onchange="previewImage()">
<img id="preview">

<input id="player" placeholder="Player Name">
<input id="year" placeholder="Year">
<input id="brand" placeholder="Brand / Set">
<input id="parallel" placeholder="Parallel / Insert: Zebra, Silver, Downtown, Patch, Auto, etc.">
<input id="condition" placeholder="Condition: Raw, PSA 10, SGC 10, Near Mint, etc.">
<input id="numbered" placeholder="Numbered: /10, /25, /99, or leave blank">

<label>Money / Profit</label>
<input id="cost" placeholder="What you paid">
<input id="price" placeholder="Selling / Asking price">
<input id="shipping" placeholder="Shipping cost">
<input id="fees" placeholder="Platform fee % ex. 13.25">

<select id="mode">
<option value="TikTok">TikTok Mode</option>
<option value="eBay">eBay Listing</option>
<option value="Shopify">Shopify Description</option>
<option value="Instagram">Instagram Caption</option>
<option value="Whatnot">Whatnot Show Description</option>
</select>

<button onclick="generateListing()">Generate Listing</button>
<button onclick="copyListing()">Copy Listing</button>
<button onclick="calculateProfit()">Calculate Profit</button>
<button class="gray" onclick="clearEverything()">Clear Everything</button>

<div id="output">Your listing will appear here...</div>

<label>Profit Calculator</label>
<div id="profitBox">Profit will appear here...</div>

<label>AI Scan</label>
<button class="gray" onclick="aiScan()">AI Scan Coming Soon 🔥</button>
</div>

<script>
function previewImage(){
const file=document.getElementById("imageUpload").files[0];
const preview=document.getElementById("preview");
if(file){
preview.src=URL.createObjectURL(file);
preview.style.display="block";
}
}

function generateListing(){
const player=document.getElementById("player").value;
const year=document.getElementById("year").value;
const brand=document.getElementById("brand").value;
const parallel=document.getElementById("parallel").value;
const condition=document.getElementById("condition").value;
const numbered=document.getElementById("numbered").value;
const price=document.getElementById("price").value;
const mode=document.getElementById("mode").value;

const title=`${year} ${brand} ${player} ${parallel} ${condition}`.trim();

const listing=`TITLE:
${title}

PLATFORM:
${mode}

DESCRIPTION:
🔥 ${player} Sports Card Spotlight 🔥

${year} ${brand}
${parallel}
Condition: ${condition}
${numbered ? "Numbered: " + numbered : ""}

Available for: $${price}

This is a strong card for collectors, football fans, and hobby investors.

Would you hold, sell, or grade this one?

#SportsCards #FootballCards #CardCollector #TheHobby #GeniusVault

First comment:
Would you grade, hold, or sell this card? 👀`;

document.getElementById("output").innerText=listing;
calculateProfit();
}

function calculateProfit(){
const sale=parseFloat(document.getElementById("price").value)||0;
const cost=parseFloat(document.getElementById("cost").value)||0;
const shipping=parseFloat(document.getElementById("shipping").value)||0;
const feePercent=parseFloat(document.getElementById("fees").value)||0;

const feeAmount=sale*(feePercent/100);
const profit=sale-cost-shipping-feeAmount;
const roi=cost>0 ? (profit/cost)*100 : 0;

document.getElementById("profitBox").innerText=
`Sale Price: $${sale.toFixed(2)}
Cost Paid: $${cost.toFixed(2)}
Shipping: $${shipping.toFixed(2)}
Platform Fees: $${feeAmount.toFixed(2)}

Estimated Profit: $${profit.toFixed(2)}
ROI: ${roi.toFixed(1)}%`;
}

function copyListing(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("Copied!");
}

function clearEverything(){
document.querySelectorAll("input").forEach(input=>input.value="");
document.getElementById("output").innerText="Your listing will appear here...";
document.getElementById("profitBox").innerText="Profit will appear here...";
document.getElementById("preview").style.display="none";
}

function aiScan(){
alert("AI Scan Coming Soon 🔥 — keeping the app stable first.");
}
</script>
</body>
</html>
