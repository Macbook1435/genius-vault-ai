<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genius Vault AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
    }
    .wrap {
      max-width: 900px;
      margin: auto;
      padding: 24px;
    }
    .card {
      background: #171717;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.08);
    }
    h1 {
      color: #ffd700;
      text-align: center;
      margin-bottom: 5px;
    }
    h2 {
      color: #ffd700;
      margin-top: 0;
    }
    .sub {
      text-align: center;
      color: #bbb;
      margin-bottom: 25px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #ddd;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #0f0f0f;
      color: #fff;
      margin-top: 6px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      margin-top: 14px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }
    .gold {
      background: #ffd700;
      color: #000;
    }
    .gray {
      background: #333;
      color: #fff;
    }
    .green {
      background: #00c853;
      color: #000;
    }
    #preview {
      max-width: 100%;
      border-radius: 14px;
      margin-top: 15px;
      display: none;
      border: 1px solid #444;
    }
    pre {
      white-space: pre-wrap;
      background: #0f0f0f;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #333;
      color: #fff;
      min-height: 140px;
    }
    .small {
      color: #aaa;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔥 Genius Vault AI</h1>
    <p class="sub">Sports Card Listing + Profit Generator</p>

    <div class="card">
      <h2>1. Upload Card Photo</h2>
      <input type="file" id="imageUpload" accept="image/*" />
      <img id="preview" />
      <button class="gray" onclick="aiScan()">Run AI Scan 🔥</button>
    </div>

    <div class="card">
      <h2>2. Card Details</h2>

      <label>Player Name</label>
      <input id="player" placeholder="Example: Jahmyr Gibbs" />

      <label>Year</label>
      <input id="year" placeholder="Example: 2023" />

      <label>Brand / Set</label>
      <input id="setName" placeholder="Example: Panini Prizm" />

      <label>Parallel / Insert</label>
      <input id="parallel" placeholder="Example: Silver Prizm, Downtown, Zebra" />

      <label>Card Number / Serial Number</label>
      <input id="numbering" placeholder="Example: #12 or /99" />

      <label>Condition</label>
      <select id="condition">
        <option>Near Mint or Better</option>
        <option>Excellent</option>
        <option>Very Good</option>
        <option>Graded</option>
      </select>

      <label>Purchase Cost</label>
      <input id="cost" type="number" placeholder="Example: 10" />

      <label>Target Sale Price</label>
      <input id="price" type="number" placeholder="Example: 29.99" />

      <button class="gold" onclick="generateListing()">Generate Listing 🚀</button>
      <button class="green" onclick="calculateProfit()">Calculate Profit 💰</button>
    </div>

    <div class="card">
      <h2>3. Output</h2>
      <pre id="output">Your generated listing will appear here.</pre>
    </div>

    <p class="small">Built for Koollicks Vault — Sports Card Seller AI Tool</p>
  </div>

  <script>
    const imageUpload = document.getElementById("imageUpload");
    const preview = document.getElementById("preview");

    imageUpload.addEventListener("change", function () {
      const file = imageUpload.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    async function aiScan() {
      const file = imageUpload.files[0];

      if (!file) {
        alert("Upload a card photo first.");
        return;
      }

      document.getElementById("output").innerText =
        "AI Scan starting 🔥\n\nReading your card image...";

      try {
        const formData = new FormData();
        formData.append("image", file);

        const response = await fetch("/api/scan", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error("Backend scan endpoint not ready yet.");
        }

        const data = await response.json();

        document.getElementById("player").value = data.player || "";
        document.getElementById("year").value = data.year || "";
        document.getElementById("setName").value = data.set || "";
        document.getElementById("parallel").value = data.parallel || "";
        document.getElementById("numbering").value = data.numbering || "";

        document.getElementById("output").innerText =
          "AI Scan Complete 🔥\n\n" + JSON.stringify(data, null, 2);

      } catch (error) {
        document.getElementById("output").innerText =
          "AI Scan button is working ✅\n\nNext step: connect the backend /api/scan endpoint to OpenAI Vision.\n\nYour upload system and button are now connected.";
      }
    }

    function generateListing() {
      const player = document.getElementById("player").value.trim();
      const year = document.getElementById("year").value.trim();
      const setName = document.getElementById("setName").value.trim();
      const parallel = document.getElementById("parallel").value.trim();
      const numbering = document.getElementById("numbering").value.trim();
      const condition = document.getElementById("condition").value;

      const title = `${year} ${setName} ${player} ${parallel} ${numbering}`.replace(/\s+/g, " ").trim();

      const description =
`${title}

Condition: ${condition}

This listing is for the exact card shown in the photos. Please review all images carefully before purchasing.

Great card for collectors, investors, and sports card fans.

Ships safely and securely from Koollicks Vault.

TikTok Caption:
🔥 ${player || "Sports card"} collectors, this one is clean. ${parallel || "Big card"} from ${setName || "a popular set"}. Perfect pickup for the vault.

Hashtags:
#sportscards #footballcards #cardcollector #thehobby #koollicksvault

First Comment:
Would you grade it, hold it, or flip it? 👀🔥`;

      document.getElementById("output").innerText =
`eBay / Shopify Title:
${title}

Description:
${description}`;
    }

    function calculateProfit() {
      const cost = parseFloat(document.getElementById("cost").value) || 0;
      const price = parseFloat(document.getElementById("price").value) || 0;

      const platformFee = price * 0.1325;
      const shipping = 4.99;
      const profit = price - cost - platformFee - shipping;

      document.getElementById("output").innerText =
`Profit Calculator 💰

Sale Price: $${price.toFixed(2)}
Purchase Cost: $${cost.toFixed(2)}
Estimated Platform Fee: $${platformFee.toFixed(2)}
Estimated Shipping: $${shipping.toFixed(2)}

Estimated Profit: $${profit.toFixed(2)}`;
    }
  </script>
</body>
</html>
