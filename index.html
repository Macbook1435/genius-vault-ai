
<!DOCTYPE html>
<html>
<head>
<title>Genius Vault AI</title>

<style>
body{
background:#0d0d0d;
color:white;
font-family:Arial;
padding:20px;
}

.app{
max-width:700px;
margin:auto;
background:#1b1b1b;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px gold;
}

h1{
text-align:center;
color:gold;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
}

#output{
margin-top:20px;
white-space:pre-wrap;
background:#111;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<h1>Genius Vault AI</h1>

<p>Sports Card Listing + Pull Tool</p>

<input id="player" placeholder="Player Name">

<input id="year" placeholder="Year">

<input id="brand" placeholder="Brand / Set">

<input id="parallel" placeholder="Parallel / Insert">

<input id="condition" placeholder="Condition">

<input id="numbered" placeholder="Numbered (ex. /25, /99)">

<input id="price" placeholder="What you paid">

<select id="mode">
<option value="ebay">eBay Listing</option>
<option value="tiktok">TikTok Post</option>
<option value="instagram">Instagram Caption</option>
</select>

<button onclick="generateListing()">
Generate AI Listing
</button>

<div id="output"></div>

</div>

<script>

async function generateListing(){

const player =
document.getElementById("player").value;

const year =
document.getElementById("year").value;

const brand =
document.getElementById("brand").value;

const parallel =
document.getElementById("parallel").value;

const condition =
document.getElementById("condition").value;

const numbered =
document.getElementById("numbered").value;

const price =
document.getElementById("price").value;

const mode =
document.getElementById("mode").value;

document.getElementById("output").innerText =
"Generating AI listing...";

try {

const response = await fetch("/api/generate", {
method:"POST",
headers:{
"Content-Type":"application/json",
},
body: JSON.stringify({
player,
year,
brand,
parallel,
condition,
numbered,
price,
mode
}),
});

const data = await response.json();

document.getElementById("output").innerText =
data.result;

} catch (error) {

document.getElementById("output").innerText =
"AI connection failed.";

}

}

</script>

</body>
</html>
